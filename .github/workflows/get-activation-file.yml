name: 🔑 Получить файл активации Unity

on:
  workflow_dispatch:

jobs:
  activation:
    name: Запросить файл активации (.alf)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Запросить .alf файл
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 6000.3.12f1

      - name: Загрузить .alf как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: unity-activation-file
          path: ./*.alf
          retention-days: 1
